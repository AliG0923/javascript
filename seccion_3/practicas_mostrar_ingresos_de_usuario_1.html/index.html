<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ingreso de usuario 1</title>
</head>
<body>
    <input type = "text" id ="inputTexto" value ="Este es un mensaje">
    <button onclick="mostrarTexto()">Click aquí</button>
    <h1 id="titulo">ingrese su dirección</h1>
    <script>
        function mostrarTexto (){
            let elementoDirección = document.getElementById("inputTexto");
            let elementoTexto = document.getElementById ("titulo");
            let mensaje = "Usted vive en " + elementoDirección.value
            elementoTexto.textContent = mensaje;

        }
    </script>

</body>
</html>
